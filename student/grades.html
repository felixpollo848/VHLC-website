<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Grades | VHLC Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Portal Navbar -->
  <nav class="navbar navbar-expand-lg vhlc-navbar">
    <div class="container-fluid px-3">
      <button id="sidebar-toggle" class="btn p-1 me-2 d-lg-none" style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand" href="#">
        <img src="../vhlc.jpeg" alt="VHLC Logo" class="brand-logo" style="object-fit: cover;">
        <div class="brand-text">
          VHLC Portal
          <small>Victoria Homes Learning Center</small>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" style="color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500"></span>
        <button onclick="logoutUser()" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:.35rem 1rem;font-size:.83rem">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="portal-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="portal-sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div style="width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--primary-dark)" id="sidebar-avatar">?</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Student</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="grades.html" class="sidebar-nav-item active"><i class="bi bi-journal-bookmark-fill"></i> My Grades</a>
        <a href="attendance.html" class="sidebar-nav-item"><i class="bi bi-calendar-check-fill"></i> Attendance</a>
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-nav-item"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logoutUser()" class="sidebar-nav-item w-100" style="border:none;background:none;text-align:left;color:rgba(255,255,255,.6)">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Content -->
    <main class="portal-content">
      <div class="portal-header">
        <div>
          <h1 class="portal-title">My Grades</h1>
          <p class="portal-subtitle">View your academic performance for the school year.</p>
        </div>
      </div>

      <div class="vhlc-card p-4">
        <!-- Quarter Tabs -->
        <div class="quarter-tabs" id="quarter-tabs">
          <button class="quarter-tab active" data-q="Q1">1st Quarter</button>
          <button class="quarter-tab" data-q="Q2">2nd Quarter</button>
          <button class="quarter-tab" data-q="Q3">3rd Quarter</button>
          <button class="quarter-tab" data-q="Q4">4th Quarter</button>
        </div>

        <div class="table-responsive">
          <table class="vhlc-table" id="grades-table">
            <thead>
              <tr id="grades-th">
                <!-- Headers injected based on grade level -->
              </tr>
            </thead>
            <tbody id="grades-tbody">
              <tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></td></tr>
            </tbody>
          </table>
        </div>

        <div class="row mt-4 pt-3 border-top d-none" id="summary-card">
          <div class="col-md-6 ms-auto">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="fw-bold text-muted">Quarter Average:</span>
              <span class="fs-4 fw-bold text-primary" id="quarter-avg">-</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold text-muted">Status:</span>
              <span id="quarter-status">-</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initSidebarToggle();
      let currentUser, studentData, allGrades = [], subjectsMap = {};

      try {
        const authData = await requireAuth('student');
        currentUser = authData.user;
        
        // Get student data
        const doc = await db.collection('students').doc(currentUser.uid).get();
        if (doc.exists) {
          studentData = doc.data();
          setSidebarUser(studentData.fullName, 'student');
          document.getElementById('nav-user-name').textContent = studentData.fullName.split(' ')[0];
          document.getElementById('sidebar-avatar').textContent = getInitials(studentData.fullName);
        }

        // Get subjects lookup
        const subjSnap = await db.collection('subjects').where('gradeLevel', '==', studentData.gradeLevel).get();
        subjSnap.forEach(s => subjectsMap[s.id] = s.data().name);

        // Fetch grades
        const gradesSnap = await db.collection('grades')
          .where('studentId', '==', currentUser.uid)
          .where('schoolYear', '==', studentData.schoolYear)
          .get();
        
        allGrades = gradesSnap.docs.map(g => g.data());
        
        // Setup headers based on Grade Level
        const th = document.getElementById('grades-th');
        if (studentData.gradeLevel <= 3) {
          th.innerHTML = `
            <th>Subject</th>
            <th>Descriptive Rating</th>
            <th>Remarks</th>
          `;
        } else {
          th.innerHTML = `
            <th>Subject</th>
            <th>PT (50%)</th>
            <th>WW (20%)</th>
            <th>Exam (30%)</th>
            <th>Final Grade</th>
            <th>Rating</th>
            <th>Remarks</th>
          `;
        }

        renderGrades('Q1');

        // Setup Tabs
        document.querySelectorAll('.quarter-tab').forEach(tab => {
          tab.addEventListener('click', (e) => {
            document.querySelectorAll('.quarter-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            renderGrades(e.target.dataset.q);
          });
        });

      } catch (err) {
        console.error(err);
      }

      function renderGrades(quarter) {
        const tbody = document.getElementById('grades-tbody');
        const summaryCard = document.getElementById('summary-card');
        
        const qGrades = allGrades.filter(g => g.quarter === quarter);
        
        if (qGrades.length === 0) {
          const colSpan = studentData.gradeLevel <= 3 ? 3 : 7;
          tbody.innerHTML = `<tr><td colspan="${colSpan}">${emptyState('📝', 'No grades posted yet', `For ${quarter}`)}</td></tr>`;
          summaryCard.classList.add('d-none');
          return;
        }

        let html = '';
        let totalNumGrade = 0;
        let numCount = 0;

        qGrades.forEach(g => {
          const subjName = subjectsMap[g.subjectId] || 'Unknown Subject';
          
          if (studentData.gradeLevel <= 3) {
            // Grades 1-3 format
            const rating = g.descriptiveRating || '-';
            let remarks = '-';
            if (rating === 'Consistent' || rating === 'Developing') remarks = gradeBadge(rating, 3);
            else if (rating === 'Beginning') remarks = gradeBadge('Needs Support', 3);
            
            html += `
              <tr>
                <td class="fw-bold">${subjName}</td>
                <td>${rating}</td>
                <td>${remarks}</td>
              </tr>
            `;
          } else {
            // Grades 4-6 format
            const pt = g.performanceTasks ?? '-';
            const ww = g.writtenWorks ?? '-';
            const ex = g.examinations ?? '-';
            const final = g.finalGrade ?? '-';
            
            let rating = '-';
            let remarks = '-';
            
            if (final !== '-') {
              rating = getDescriptiveRating(final, studentData.gradeLevel);
              remarks = gradeBadge(final, studentData.gradeLevel);
              totalNumGrade += parseFloat(final);
              numCount++;
            }

            html += `
              <tr>
                <td class="fw-bold">${subjName}</td>
                <td>${pt}</td>
                <td>${ww}</td>
                <td>${ex}</td>
                <td class="fw-bold">${final}</td>
                <td class="fs-xs text-muted">${rating}</td>
                <td>${remarks}</td>
              </tr>
            `;
          }
        });

        tbody.innerHTML = html;

        // Show summary for 4-6
        if (studentData.gradeLevel > 3 && numCount > 0) {
          summaryCard.classList.remove('d-none');
          const avg = (totalNumGrade / numCount).toFixed(2);
          document.getElementById('quarter-avg').textContent = avg;
          document.getElementById('quarter-status').innerHTML = gradeBadge(avg, studentData.gradeLevel);
        } else {
          summaryCard.classList.add('d-none');
        }
      }
    });
  </script>
</body>
</html>
