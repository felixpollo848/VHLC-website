<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | VHLC Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Portal Navbar -->
  <nav class="navbar navbar-expand-lg vhlc-navbar">
    <div class="container-fluid px-3">
      <button id="sidebar-toggle" class="btn p-1 me-2 d-lg-none" style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand" href="#">
        <img src="../vhlc.jpeg" alt="VHLC Logo" class="brand-logo" style="object-fit: cover;">
        <div class="brand-text">
          VHLC Portal
          <small>Victoria Homes Learning Center</small>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" style="color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500"></span>
        <button onclick="logoutUser()" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:.35rem 1rem;font-size:.83rem">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="portal-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="portal-sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div style="width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--primary-dark)" id="sidebar-avatar">?</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Student</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="grades.html" class="sidebar-nav-item"><i class="bi bi-journal-bookmark-fill"></i> My Grades</a>
        <a href="attendance.html" class="sidebar-nav-item"><i class="bi bi-calendar-check-fill"></i> Attendance</a>
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-nav-item active"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logoutUser()" class="sidebar-nav-item w-100" style="border:none;background:none;text-align:left;color:rgba(255,255,255,.6)">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Content -->
    <main class="portal-content">
      <div class="portal-header">
        <div>
          <h1 class="portal-title">My Profile</h1>
          <p class="portal-subtitle">Manage your account settings.</p>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="vhlc-card text-center py-5">
            <div id="profile-avatar" style="width:100px;height:100px;background:var(--primary-light);color:var(--primary);font-size:2.5rem;font-weight:800;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">?</div>
            <h4 class="fw-bold mb-1" id="profile-name">Loading...</h4>
            <div class="mb-3"><span class="badge-role badge-student">Student</span></div>
            <p class="text-muted fs-sm mb-0"><i class="bi bi-envelope me-1"></i> <span id="profile-email">...</span></p>
          </div>
        </div>
        
        <div class="col-lg-8">
          <div class="vhlc-card p-4 mb-4">
            <h5 class="fw-bold mb-4 border-bottom pb-2">Academic Information</h5>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="text-muted fs-xs text-uppercase fw-bold">Learner Reference Number (LRN)</label>
                <div class="fs-6 fw-bold" id="info-lrn">-</div>
              </div>
              <div class="col-md-6">
                <label class="text-muted fs-xs text-uppercase fw-bold">School Year</label>
                <div class="fs-6 fw-bold" id="info-sy">-</div>
              </div>
              <div class="col-md-6">
                <label class="text-muted fs-xs text-uppercase fw-bold">Grade Level</label>
                <div class="fs-6 fw-bold" id="info-grade">-</div>
              </div>
              <div class="col-md-6">
                <label class="text-muted fs-xs text-uppercase fw-bold">Section</label>
                <div class="fs-6 fw-bold" id="info-sec">-</div>
              </div>
            </div>
          </div>

          <div class="vhlc-card p-4">
            <h5 class="fw-bold mb-4 border-bottom pb-2">Security Settings</h5>
            <form id="password-form">
              <div class="row g-3">
                <div class="col-md-6 form-group">
                  <label class="vhlc-label" for="new-pass">New Password</label>
                  <input type="password" id="new-pass" class="vhlc-form-control" required minlength="6">
                </div>
                <div class="col-md-6 form-group">
                  <label class="vhlc-label" for="confirm-pass">Confirm Password</label>
                  <input type="password" id="confirm-pass" class="vhlc-form-control" required minlength="6">
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn-primary-vhlc" id="btn-save-pass">Update Password</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initSidebarToggle();
      
      try {
        const { user } = await requireAuth('student');
        document.getElementById('profile-email').textContent = user.email;
        
        const doc = await db.collection('students').doc(user.uid).get();
        if (doc.exists) {
          const s = doc.data();
          
          setSidebarUser(s.fullName, 'student');
          document.getElementById('nav-user-name').textContent = s.fullName.split(' ')[0];
          
          const init = getInitials(s.fullName);
          document.getElementById('sidebar-avatar').textContent = init;
          document.getElementById('profile-avatar').textContent = init;
          
          document.getElementById('profile-name').textContent = s.fullName;
          document.getElementById('info-lrn').textContent = s.lrn || 'Not assigned';
          document.getElementById('info-sy').textContent = s.schoolYear || '-';
          document.getElementById('info-grade').textContent = s.gradeLevel ? `Grade ${s.gradeLevel}` : '-';
          document.getElementById('info-sec').textContent = s.section || '-';
        }

        // Handle Password Change
        document.getElementById('password-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const p1 = document.getElementById('new-pass').value;
          const p2 = document.getElementById('confirm-pass').value;
          const btn = document.getElementById('btn-save-pass');
          
          if (p1 !== p2) {
            showToast('Passwords do not match', 'error');
            return;
          }

          btn.disabled = true;
          btn.innerHTML = 'Updating...';

          try {
            await changePassword(p1);
            showToast('Password updated successfully', 'success');
            e.target.reset();
          } catch (err) {
            console.error(err);
            if (err.code === 'auth/requires-recent-login') {
              showToast('Please log out and log in again to change password.', 'warning');
            } else {
              showToast(err.message, 'error');
            }
          } finally {
            btn.disabled = false;
            btn.innerHTML = 'Update Password';
          }
        });

      } catch (err) {
        console.error(err);
      }
    });
  </script>
</body>
</html>
