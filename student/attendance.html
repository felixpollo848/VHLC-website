<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance | VHLC Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Portal Navbar -->
  <nav class="navbar navbar-expand-lg vhlc-navbar">
    <div class="container-fluid px-3">
      <button id="sidebar-toggle" class="btn p-1 me-2 d-lg-none" style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand" href="#">
        <img src="../vhlc.jpeg" alt="VHLC Logo" class="brand-logo" style="object-fit: cover;">
        <div class="brand-text">
          VHLC Portal
          <small>Victoria Homes Learning Center</small>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" style="color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500"></span>
        <button onclick="logoutUser()" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:.35rem 1rem;font-size:.83rem">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="portal-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="portal-sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div style="width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--primary-dark)" id="sidebar-avatar">?</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Student</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="grades.html" class="sidebar-nav-item"><i class="bi bi-journal-bookmark-fill"></i> My Grades</a>
        <a href="attendance.html" class="sidebar-nav-item active"><i class="bi bi-calendar-check-fill"></i> Attendance</a>
        <div class="sidebar-section-label">Account</div>
        <a href="profile.html" class="sidebar-nav-item"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logoutUser()" class="sidebar-nav-item w-100" style="border:none;background:none;text-align:left;color:rgba(255,255,255,.6)">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Content -->
    <main class="portal-content">
      <div class="portal-header">
        <div>
          <h1 class="portal-title">Attendance Record</h1>
          <p class="portal-subtitle">Track your daily school attendance.</p>
        </div>
      </div>

      <div class="attendance-summary">
        <div class="att-stat">
          <span class="att-num text-success" id="att-present">-</span>
          <span class="att-label">Days Present</span>
        </div>
        <div class="att-stat">
          <span class="att-num text-danger" id="att-absent">-</span>
          <span class="att-label">Days Absent</span>
        </div>
        <div class="att-stat">
          <span class="att-num text-warning" id="att-late">-</span>
          <span class="att-label">Days Late</span>
        </div>
      </div>

      <div class="vhlc-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="fw-bold m-0">Detailed History</h5>
          <select id="month-filter" class="vhlc-form-control w-auto py-1 fs-sm">
            <option value="all">All Months</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
        </div>

        <div class="table-responsive">
          <table class="vhlc-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Day</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="att-tbody">
              <tr><td colspan="3" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initSidebarToggle();
      let allRecords = [];

      try {
        const { user } = await requireAuth('student');
        
        // Profile setup
        const doc = await db.collection('students').doc(user.uid).get();
        if (doc.exists) {
          const s = doc.data();
          setSidebarUser(s.fullName, 'student');
          document.getElementById('nav-user-name').textContent = s.fullName.split(' ')[0];
          document.getElementById('sidebar-avatar').textContent = getInitials(s.fullName);
        }

        // Fetch attendance
        const snap = await db.collection('attendance')
          .where('studentId', '==', user.uid)
          .orderBy('date', 'desc')
          .get();

        allRecords = snap.docs.map(d => d.data());
        
        renderStats(allRecords);
        renderTable(allRecords);

        // Filter event
        document.getElementById('month-filter').addEventListener('change', (e) => {
          const m = e.target.value;
          if (m === 'all') {
            renderTable(allRecords);
          } else {
            const filtered = allRecords.filter(r => {
              const d = new Date(r.date);
              return (d.getMonth() + 1).toString() === m;
            });
            renderTable(filtered);
          }
        });

      } catch (err) {
        console.error(err);
      }

      function renderStats(records) {
        let p = 0, a = 0, l = 0;
        records.forEach(r => {
          if (r.status === 'Present') p++;
          if (r.status === 'Absent') a++;
          if (r.status === 'Late') l++;
        });
        document.getElementById('att-present').textContent = p;
        document.getElementById('att-absent').textContent = a;
        document.getElementById('att-late').textContent = l;
      }

      function renderTable(records) {
        const tbody = document.getElementById('att-tbody');
        if (records.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3">${emptyState('📅', 'No attendance records found')}</td></tr>`;
          return;
        }

        let html = '';
        records.forEach(r => {
          const d = new Date(r.date);
          const dateStr = d.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
          const dayStr = d.toLocaleDateString('en-PH', { weekday: 'short' });
          
          let badge = '';
          if (r.status === 'Present') badge = '<span class="badge-present">Present</span>';
          else if (r.status === 'Absent') badge = '<span class="badge-absent">Absent</span>';
          else if (r.status === 'Late') badge = '<span class="badge-late">Late</span>';

          html += `
            <tr>
              <td class="fw-bold">${dateStr}</td>
              <td class="text-muted">${dayStr}</td>
              <td>${badge}</td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
      }
    });
  </script>
</body>
</html>
