<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encode Grades | VHLC Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg vhlc-navbar">
    <div class="container-fluid px-3">
      <button id="sidebar-toggle" class="btn p-1 me-2 d-lg-none" style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand" href="#">
        <img src="../vhlc.jpeg" alt="VHLC Logo" class="brand-logo" style="object-fit: cover;">
        <div class="brand-text">
          VHLC Portal
          <small>Victoria Homes Learning Center</small>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" style="color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500"></span>
        <button onclick="logoutUser()" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:.35rem 1rem;font-size:.83rem">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="portal-layout">
    <aside class="sidebar" id="portal-sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div style="width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--primary-dark)" id="sidebar-avatar">?</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Teacher</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="grades.html" class="sidebar-nav-item active"><i class="bi bi-journal-check"></i> Encode Grades</a>
        <a href="attendance.html" class="sidebar-nav-item"><i class="bi bi-calendar-check-fill"></i> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logoutUser()" class="sidebar-nav-item w-100" style="border:none;background:none;text-align:left;color:rgba(255,255,255,.6)">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </aside>

    <main class="portal-content">
      <div class="portal-header">
        <div>
          <h1 class="portal-title">Encode Grades</h1>
          <p class="portal-subtitle">Enter student grades based on DepEd guidelines.</p>
        </div>
      </div>

      <div class="vhlc-card p-4 mb-4 bg-light border-0">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="vhlc-label">Grade Level</label>
            <select id="sel-grade" class="vhlc-form-control">
              <option value="" disabled selected>Select Grade</option>
              <option value="1">Grade 1</option>
              <option value="2">Grade 2</option>
              <option value="3">Grade 3</option>
              <option value="4">Grade 4</option>
              <option value="5">Grade 5</option>
              <option value="6">Grade 6</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="vhlc-label">Section</label>
            <select id="sel-section" class="vhlc-form-control" disabled>
              <option value="" disabled selected>Select Section</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="vhlc-label">Subject</label>
            <select id="sel-subject" class="vhlc-form-control" disabled>
              <option value="" disabled selected>Select Subject</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="vhlc-label">Quarter</label>
            <select id="sel-quarter" class="vhlc-form-control">
              <option value="Q1">1st Quarter</option>
              <option value="Q2">2nd Quarter</option>
              <option value="Q3">3rd Quarter</option>
              <option value="Q4">4th Quarter</option>
            </select>
          </div>
        </div>
        <div class="mt-3 text-end">
          <button class="btn-primary-vhlc" id="btn-load">Load Students <i class="bi bi-arrow-down-circle ms-1"></i></button>
        </div>
      </div>

      <div class="vhlc-card p-0 overflow-hidden d-none" id="table-container">
        <div class="p-3 border-bottom bg-white d-flex justify-content-between align-items-center">
          <h6 class="fw-bold m-0" id="table-title">Student List</h6>
          <button class="btn-primary-vhlc btn-sm" id="btn-save"><i class="bi bi-save"></i> Save All Grades</button>
        </div>
        <div class="table-responsive">
          <table class="vhlc-table">
            <thead>
              <tr id="table-head">
                <!-- Dynamically filled based on grade level -->
              </tr>
            </thead>
            <tbody id="students-tbody">
              <!-- Students here -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initSidebarToggle();
      let currentUser, currentTeacher;
      let studentsList = [];
      let currentGradeLevel = 0;

      const selGrade = document.getElementById('sel-grade');
      const selSec = document.getElementById('sel-section');
      const selSubj = document.getElementById('sel-subject');
      const selQtr = document.getElementById('sel-quarter');
      const btnLoad = document.getElementById('btn-load');
      const btnSave = document.getElementById('btn-save');
      const tbody = document.getElementById('students-tbody');

      try {
        const { user } = await requireAuth('teacher');
        currentUser = user;
        
        const doc = await db.collection('teachers').doc(user.uid).get();
        currentTeacher = doc.data();
        
        setSidebarUser(currentTeacher.fullName, 'teacher');
        document.getElementById('nav-user-name').textContent = currentTeacher.fullName.split(' ')[0];
        document.getElementById('sidebar-avatar').textContent = getInitials(currentTeacher.fullName);

        // Populate sections based on assigned
        populateSelect(selSec, currentTeacher.sections || []);

      } catch (err) {
        console.error(err);
      }

      selSec.addEventListener('change', async () => {
        selSubj.disabled = true;
        selSubj.innerHTML = '<option value="" disabled selected>Loading...</option>';
        
        const lvl = parseInt(selGrade.value);
        if(!lvl) return;
        
        try {
          const snap = await db.collection('subjects').where('gradeLevel', '==', lvl).get();
          const subjects = [];
          snap.forEach(s => {
            if((currentTeacher.subjects || []).includes(s.data().name)) {
              subjects.push({value: s.id, label: s.data().name});
            }
          });
          
          populateSelect(selSubj, subjects, 'Select Subject');
          selSubj.disabled = false;
        } catch(err) {
          console.error(err);
        }
      });

      selGrade.addEventListener('change', () => {
        selSec.disabled = false;
        selSubj.disabled = true;
        selSubj.innerHTML = '<option value="" disabled selected>Select Subject</option>';
      });

      btnLoad.addEventListener('click', async () => {
        if(!selGrade.value || !selSec.value || !selSubj.value || !selQtr.value) {
          showToast('Please select all filters', 'warning');
          return;
        }

        btnLoad.disabled = true;
        btnLoad.innerHTML = 'Loading...';
        document.getElementById('table-container').classList.remove('d-none');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>`;

        currentGradeLevel = parseInt(selGrade.value);
        const sec = selSec.value;
        const subjId = selSubj.value;
        const qtr = selQtr.value;

        // Setup Headers
        const thead = document.getElementById('table-head');
        if (currentGradeLevel <= 3) {
          thead.innerHTML = `<th>Student Name</th><th>Descriptive Rating</th>`;
        } else {
          thead.innerHTML = `<th>Student Name</th><th width="15%">PT (50%)</th><th width="15%">WW (20%)</th><th width="15%">Exam (30%)</th><th width="15%">Final Grade</th>`;
        }

        try {
          // Get students
          const stuSnap = await db.collection('students').where('section', '==', sec).get();
          studentsList = stuSnap.docs.map(d => d.data());

          // Get existing grades
          const gradesSnap = await db.collection('grades')
            .where('subjectId', '==', subjId)
            .where('quarter', '==', qtr)
            .get();
            
          const existingGrades = {};
          gradesSnap.forEach(g => {
            const data = g.data();
            existingGrades[data.studentId] = { id: g.id, ...data };
          });

          if(studentsList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No students found in this section.</td></tr>`;
            return;
          }

          // Sort students alphabetically
          studentsList.sort((a,b) => a.fullName.localeCompare(b.fullName));

          let html = '';
          studentsList.forEach(s => {
            const eg = existingGrades[s.uid] || {};
            
            if (currentGradeLevel <= 3) {
              const r = eg.descriptiveRating || '';
              html += `
                <tr data-sid="${s.uid}" data-gid="${eg.id || ''}">
                  <td class="fw-bold align-middle">${escapeHTML(s.fullName)}</td>
                  <td>
                    <select class="vhlc-form-control input-rating">
                      <option value="" disabled ${!r ? 'selected' : ''}>Select Rating</option>
                      <option value="Consistent" ${r==='Consistent'?'selected':''}>Consistent</option>
                      <option value="Developing" ${r==='Developing'?'selected':''}>Developing</option>
                      <option value="Beginning" ${r==='Beginning'?'selected':''}>Beginning</option>
                    </select>
                  </td>
                </tr>
              `;
            } else {
              const pt = eg.performanceTasks || '';
              const ww = eg.writtenWorks || '';
              const ex = eg.examinations || '';
              const fin = eg.finalGrade || '';
              
              html += `
                <tr data-sid="${s.uid}" data-gid="${eg.id || ''}">
                  <td class="fw-bold align-middle">${escapeHTML(s.fullName)}</td>
                  <td><input type="number" class="vhlc-form-control input-pt" min="0" max="100" value="${pt}"></td>
                  <td><input type="number" class="vhlc-form-control input-ww" min="0" max="100" value="${ww}"></td>
                  <td><input type="number" class="vhlc-form-control input-ex" min="0" max="100" value="${ex}"></td>
                  <td><input type="text" class="vhlc-form-control input-final bg-light fw-bold" readonly value="${fin}"></td>
                </tr>
              `;
            }
          });
          
          tbody.innerHTML = html;

          // Attach listeners for auto-compute (Grades 4-6)
          if (currentGradeLevel > 3) {
            document.querySelectorAll('#students-tbody tr').forEach(tr => {
              const ipt = tr.querySelector('.input-pt');
              const iww = tr.querySelector('.input-ww');
              const iex = tr.querySelector('.input-ex');
              const ifin = tr.querySelector('.input-final');
              
              const calc = () => {
                if (ipt.value && iww.value && iex.value) {
                  ifin.value = computeGrade(ipt.value, iww.value, iex.value);
                } else {
                  ifin.value = '';
                }
              };
              ipt.addEventListener('input', calc);
              iww.addEventListener('input', calc);
              iex.addEventListener('input', calc);
            });
          }

        } catch (err) {
          console.error(err);
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Failed to load data.</td></tr>`;
        } finally {
          btnLoad.disabled = false;
          btnLoad.innerHTML = 'Load Students <i class="bi bi-arrow-down-circle ms-1"></i>';
        }
      });

      // Save Grades
      btnSave.addEventListener('click', async () => {
        btnSave.disabled = true;
        btnSave.innerHTML = '<i class="bi bi-hourglass"></i> Saving...';

        const batch = db.batch();
        const trs = document.querySelectorAll('#students-tbody tr');
        let hasData = false;

        trs.forEach(tr => {
          const sid = tr.getAttribute('data-sid');
          const gid = tr.getAttribute('data-gid');
          if (!sid) return;

          let dataToSave = null;

          if (currentGradeLevel <= 3) {
            const rating = tr.querySelector('.input-rating').value;
            if (rating) {
              dataToSave = {
                studentId: sid,
                subjectId: selSubj.value,
                teacherId: currentUser.uid,
                quarter: selQtr.value,
                descriptiveRating: rating,
                schoolYear: currentSchoolYear(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              };
            }
          } else {
            const pt = tr.querySelector('.input-pt').value;
            const ww = tr.querySelector('.input-ww').value;
            const ex = tr.querySelector('.input-ex').value;
            const fin = tr.querySelector('.input-final').value;
            
            if (pt && ww && ex && fin) {
              dataToSave = {
                studentId: sid,
                subjectId: selSubj.value,
                teacherId: currentUser.uid,
                quarter: selQtr.value,
                performanceTasks: parseFloat(pt),
                writtenWorks: parseFloat(ww),
                examinations: parseFloat(ex),
                finalGrade: parseFloat(fin),
                schoolYear: currentSchoolYear(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              };
            }
          }

          if (dataToSave) {
            hasData = true;
            if (gid) {
              batch.update(db.collection('grades').doc(gid), dataToSave);
            } else {
              const ref = db.collection('grades').doc();
              batch.set(ref, dataToSave);
            }
          }
        });

        if (!hasData) {
          showToast('No complete grades to save.', 'warning');
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-save"></i> Save All Grades';
          return;
        }

        try {
          await batch.commit();
          showToast('Grades saved successfully!', 'success');
          // Reload to get fresh doc IDs
          btnLoad.click();
        } catch (err) {
          console.error(err);
          showToast('Failed to save grades.', 'error');
        } finally {
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-save"></i> Save All Grades';
        }
      });
    });
  </script>
</body>
</html>
