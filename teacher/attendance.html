<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Attendance | VHLC Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg vhlc-navbar">
    <div class="container-fluid px-3">
      <button id="sidebar-toggle" class="btn p-1 me-2 d-lg-none" style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand" href="#">
        <img src="../vhlc.jpeg" alt="VHLC Logo" class="brand-logo" style="object-fit: cover;">
        <div class="brand-text">
          VHLC Portal
          <small>Victoria Homes Learning Center</small>
        </div>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="nav-user-name" style="color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500"></span>
        <button onclick="logoutUser()" class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:.35rem 1rem;font-size:.83rem">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="portal-layout">
    <aside class="sidebar" id="portal-sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div style="width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--primary-dark)" id="sidebar-avatar">?</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Teacher</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main</div>
        <a href="dashboard.html" class="sidebar-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="grades.html" class="sidebar-nav-item"><i class="bi bi-journal-check"></i> Encode Grades</a>
        <a href="attendance.html" class="sidebar-nav-item active"><i class="bi bi-calendar-check-fill"></i> Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logoutUser()" class="sidebar-nav-item w-100" style="border:none;background:none;text-align:left;color:rgba(255,255,255,.6)">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </aside>

    <main class="portal-content">
      <div class="portal-header">
        <div>
          <h1 class="portal-title">Record Attendance</h1>
          <p class="portal-subtitle">Track daily student attendance.</p>
        </div>
      </div>

      <div class="vhlc-card p-4 mb-4 bg-light border-0">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="vhlc-label">Section</label>
            <select id="sel-section" class="vhlc-form-control">
              <option value="" disabled selected>Select Section</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="vhlc-label">Date</label>
            <input type="date" id="att-date" class="vhlc-form-control">
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <button class="btn-primary-vhlc w-100 justify-content-center" id="btn-load">Load Roster <i class="bi bi-arrow-down-circle ms-1"></i></button>
          </div>
        </div>
      </div>

      <div class="vhlc-card p-0 overflow-hidden d-none" id="table-container">
        <div class="p-3 border-bottom bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
          <h6 class="fw-bold m-0" id="table-title">Student Roster</h6>
          <div>
            <button class="btn btn-outline-success btn-sm me-2 fw-bold" id="btn-mark-all"><i class="bi bi-check-all"></i> Mark All Present</button>
            <button class="btn-primary-vhlc btn-sm" id="btn-save"><i class="bi bi-save"></i> Save Attendance</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="vhlc-table">
            <thead>
              <tr>
                <th>Student Name</th>
                <th width="30%">Status</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <!-- Students here -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initSidebarToggle();
      let currentUser, currentTeacher;
      let studentsList = [];
      
      const attDate = document.getElementById('att-date');
      attDate.value = todayISO(); // Set to today

      const selSec = document.getElementById('sel-section');
      const btnLoad = document.getElementById('btn-load');
      const btnSave = document.getElementById('btn-save');
      const btnMarkAll = document.getElementById('btn-mark-all');
      const tbody = document.getElementById('students-tbody');

      try {
        const { user } = await requireAuth('teacher');
        currentUser = user;
        
        const doc = await db.collection('teachers').doc(user.uid).get();
        currentTeacher = doc.data();
        
        setSidebarUser(currentTeacher.fullName, 'teacher');
        document.getElementById('nav-user-name').textContent = currentTeacher.fullName.split(' ')[0];
        document.getElementById('sidebar-avatar').textContent = getInitials(currentTeacher.fullName);

        // Populate sections
        populateSelect(selSec, currentTeacher.sections || []);

      } catch (err) {
        console.error(err);
      }

      btnLoad.addEventListener('click', async () => {
        if(!selSec.value || !attDate.value) {
          showToast('Please select Section and Date', 'warning');
          return;
        }

        btnLoad.disabled = true;
        btnLoad.innerHTML = 'Loading...';
        document.getElementById('table-container').classList.remove('d-none');
        tbody.innerHTML = `<tr><td colspan="2" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>`;

        const sec = selSec.value;
        const dateVal = attDate.value;

        try {
          // Get students
          const stuSnap = await db.collection('students').where('section', '==', sec).get();
          studentsList = stuSnap.docs.map(d => d.data());

          // Get existing attendance
          const attSnap = await db.collection('attendance')
            .where('date', '==', dateVal)
            .get(); // Note: without composite index, we might fetch all for this date, then filter
            
          const existingAtt = {};
          attSnap.forEach(a => {
            const data = a.data();
            // Filter manually by teacher/section if needed, but usually date+student is enough
            existingAtt[data.studentId] = { id: a.id, ...data };
          });

          if(studentsList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted py-4">No students found.</td></tr>`;
            return;
          }

          studentsList.sort((a,b) => a.fullName.localeCompare(b.fullName));

          let html = '';
          studentsList.forEach(s => {
            const ea = existingAtt[s.uid] || {};
            const status = ea.status || ''; // Present, Absent, Late
            
            html += `
              <tr data-sid="${s.uid}" data-aid="${ea.id || ''}">
                <td class="fw-bold align-middle">${escapeHTML(s.fullName)}</td>
                <td>
                  <div class="d-flex gap-3">
                    <div class="form-check">
                      <input class="form-check-input att-radio" type="radio" name="att_${s.uid}" value="Present" id="p_${s.uid}" ${status==='Present'?'checked':''}>
                      <label class="form-check-label text-success fw-bold" for="p_${s.uid}">P</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input att-radio" type="radio" name="att_${s.uid}" value="Absent" id="a_${s.uid}" ${status==='Absent'?'checked':''}>
                      <label class="form-check-label text-danger fw-bold" for="a_${s.uid}">A</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input att-radio" type="radio" name="att_${s.uid}" value="Late" id="l_${s.uid}" ${status==='Late'?'checked':''}>
                      <label class="form-check-label text-warning fw-bold" for="l_${s.uid}">L</label>
                    </div>
                  </div>
                </td>
              </tr>
            `;
          });
          
          tbody.innerHTML = html;

        } catch (err) {
          console.error(err);
          tbody.innerHTML = `<tr><td colspan="2" class="text-center text-danger">Failed to load data.</td></tr>`;
        } finally {
          btnLoad.disabled = false;
          btnLoad.innerHTML = 'Load Roster <i class="bi bi-arrow-down-circle ms-1"></i>';
        }
      });

      btnMarkAll.addEventListener('click', () => {
        document.querySelectorAll('.att-radio[value="Present"]').forEach(r => r.checked = true);
      });

      // Save Attendance
      btnSave.addEventListener('click', async () => {
        btnSave.disabled = true;
        btnSave.innerHTML = '<i class="bi bi-hourglass"></i> Saving...';

        const batch = db.batch();
        const trs = document.querySelectorAll('#students-tbody tr');
        let hasData = false;

        trs.forEach(tr => {
          const sid = tr.getAttribute('data-sid');
          const aid = tr.getAttribute('data-aid');
          const selected = tr.querySelector(`input[name="att_${sid}"]:checked`);
          
          if (sid && selected) {
            hasData = true;
            const dataToSave = {
              studentId: sid,
              teacherId: currentUser.uid,
              date: attDate.value,
              status: selected.value,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (aid) {
              batch.update(db.collection('attendance').doc(aid), dataToSave);
            } else {
              const ref = db.collection('attendance').doc();
              batch.set(ref, dataToSave);
            }
          }
        });

        if (!hasData) {
          showToast('No attendance marked to save.', 'warning');
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-save"></i> Save Attendance';
          return;
        }

        try {
          await batch.commit();
          showToast('Attendance saved successfully!', 'success');
          btnLoad.click(); // reload to get IDs
        } catch (err) {
          console.error(err);
          showToast('Failed to save attendance.', 'error');
        } finally {
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-save"></i> Save Attendance';
        }
      });
    });
  </script>
</body>
</html>
